<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obby Revival Project Hub/title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #121212; color: #fff; }
        .level { border: 1px solid #333; padding: 15px; margin-bottom: 10px; background: #1e1e1e; border-radius: 6px; }
        .action-buttons button { margin-right: 5px; padding: 8px 12px; cursor: pointer; }
        .leaderboard-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #222; }
        #searchBar { width: 100%; padding: 10px; margin-bottom: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <input type="text" id="searchBar" oninput="filterLevels()" placeholder="Search for serious obbies here.">
    
    <h2>Leaderboard</h2>
    <ul id="leaderboard"></ul>

    <h2>Community Obbies</h2>
    <div id="levels"></div>

<script>
let currentFileNameForExport = "";
function handleFileImport(file) {
    if (!file) return;

    currentFileNameForExport = file.name.replace(".rbxlx", "");

    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const xmlText = e.target.result;
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");

            const obbyNode = xmlDoc.querySelector('Item[class="Folder"][name="Obby"], Item[class="Model"][name="Obby"]');
            
            let obbyName = "Unknown Obby";
            let difficulty = "not defined";
            let creator = "John huper";
            let serializedData = null;

            if (obbyNode) {
                serializedData = serializeInstance(obbyNode);
                const props = obbyNode.querySelector(':scope > Properties');
                if (props) {
                    const nameEl = props.querySelector('string[name="ObbyName"]');
                    const diffEl = props.querySelector('string[name="ObbyDifficulty"]');
                    const creatorEl = props.querySelector('string[name="ObbyCreator"]');
                    
                    if (nameEl) obbyName = nameEl.textContent.trim();
                    if (diffEl) difficulty = diffEl.textContent.trim();
                    if (creatorEl) creator = creatorEl.textContent.trim();
                }
            } else {
                obbyName = currentFileNameForExport || "Unknown Obby";
            }

            const finalPayload = {
                "ObbyName": obbyName,
                "Difficulty": difficulty,
                "Creator": creator,
                "Data": serializedData
            };

            const blob = new Blob([JSON.stringify(finalPayload, null, 4)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `${obbyName}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            URL.revokeObjectURL(url);
            alert("exported brochacho");

        } catch (err) {
            alert("error...pls dm me if ts happens:" + err.message);
        }
    };
    reader.readAsText(file);
}

function serializeInstance(node) {
    const classNameAttr = node.getAttribute('class');
    let objName = "Unknown";
    
    const propsNode = node.querySelector(':scope > Properties');
    if (propsNode) {
        const nameEl = propsNode.querySelector('string[name="Name"]');
        if (nameEl) objName = nameEl.textContent.trim();
    }

    const childNodes = node.querySelectorAll(':scope > Item');
    const isBasePart = ["Part", "WedgePart", "CornerWedgePart", "MeshPart", "SpawnLocation", "TrussPart"].includes(classNameAttr);
    
    if (!isBasePart && childNodes.length === 0) {
        return null;
    }

    let className = classNameAttr;
    if (objName === "SpawnLocation") {
        className = "Spawn";
    } else if (objName === "Truss") {
        className = "Truss";
    }

    const data = {
        "ObbyName": currentFileNameForExport,
        "Name": objName,
        "ClassName": className,
        "Children": []
    };

    if (isBasePart && propsNode) {
        const positionNode = propsNode.querySelector('Vector3[name="Position"]');
        const rotationNode = propsNode.querySelector('Vector3[name="Rotation"]');
        const sizeNode = propsNode.querySelector('Vector3[name="size"]') || propsNode.querySelector('Vector3[name="Size"]');
        const colorNode = propsNode.querySelector('Color3[name="Color"]') || propsNode.querySelector('Color3uint8[name="Color3uint8"]');

        data.Properties = {
            "Size": parseVector3(sizeNode),
            "Position": positionNode ? parseVector3(positionNode) : { "X": 0, "Y": 0, "Z": 0 },
            "Rotation": rotationNode ? parseVector3(rotationNode) : { "X": 0, "Y": 0, "Z": 0 },
            "Color": parseColor3(colorNode)
        };
    }

    childNodes.forEach(child => {
        const serializedChild = serializeInstance(child);
        if (serializedChild) {
            data.Children.push(serializedChild);
        }
    });

    return data;
}

function parseVector3(node) {
    if (!node) return { "X": 1, "Y": 1, "Z": 1 }; 
    
    const xNode = node.querySelector('X') || node.querySelector('x');
    const yNode = node.querySelector('Y') || node.querySelector('y');
    const zNode = node.querySelector('Z') || node.querySelector('z');

    return {
        "X": xNode ? Math.round(Number(xNode.textContent) * 1000) / 1000 : 1,
        "Y": yNode ? Math.round(Number(yNode.textContent) * 1000) / 1000 : 1,
        "Z": zNode ? Math.round(Number(zNode.textContent) * 1000) / 1000 : 1
    };
}

function parseColor3(node) {
    if (!node) return { "R": 1, "G": 1, "B": 1 };
    if (node.tagName === "Color3uint8") {
        const val = Number(node.textContent);
        return {
            "R": ((val >> 16) & 255) / 255,
            "G": ((val >> 8) & 255) / 255,
            "B": (val & 255) / 255
        };
    }
    
    const rNode = node.querySelector('R') || node.querySelector('r');
    const gNode = node.querySelector('G') || node.querySelector('g');
    const bNode = node.querySelector('B') || node.querySelector('b');

    return {
        "R": rNode ? Number(rNode.textContent) : 1,
        "G": gNode ? Number(gNode.textContent) : 1,
        "B": bNode ? Number(bNode.textContent) : 1
    };
}

let allLoadedLevels = [];
async function loadLevels() {
    const { data, error } = await supabaseClient
        .from("levels")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error("error:", error);
        return;
    }
    allLoadedLevels = data;
    document.getElementById("searchBar").value = "";
    renderLevelsList(allLoadedLevels);
    loadLeaderboard();
}

function renderLevelsList(levelsToRender) {
    const div = document.getElementById("levels");
    div.innerHTML = "";

    if (levelsToRender.length === 0) {
        div.innerHTML = `<p style="color: #888; font-size: 14px; text-align: center; margin-top: 20px;">no obbies found...</p>`;
        return;
    }

    levelsToRender.forEach(level => {
        const starsCount = level.stars || 0;
        const item = document.createElement("div");
        item.className = "level";
        
        let sizeDisplay = "";
        if (level.file_size) {
            sizeDisplay = level.file_size;
        } else if (level.data) {
            const rawLength = JSON.stringify(level.data).length;
            sizeDisplay = rawLength < 1024 ? rawLength + " B" : (rawLength / 1024).toFixed(1) + " KB";
        }

        item.innerHTML = `
            <h3>${level.title} <span style="font-size: 12px; color: #888; margin-left: 5px;">(${sizeDisplay})</span></h3>
            <div class="action-buttons">
                <button class="star-btn" onclick="likeLevel(${level.id})">⭐ ${starsCount}</button>
                <button onclick="downloadLevel(${level.id})">Download</button>
            </div>
        `;

        div.appendChild(item);
    });
}

function filterLevels() {
    const query = document.getElementById("searchBar").value.toLowerCase().trim();
    const filtered = allLoadedLevels.filter(level => {
        return level.title && level.title.toLowerCase().includes(query);
    });
    renderLevelsList(filtered);
}

async function likeLevel(id) {
    let likedLevels = JSON.parse(localStorage.getItem("liked_levels")) || [];

    if (likedLevels.includes(id)) {
        alert("you cannot");
        return;
    }
    const { data: currentLevel, error: fetchError } = await supabaseClient
        .from("levels")
        .select("stars")
        .eq("id", id)
        .single();

    if (fetchError || !currentLevel) {
        console.error("error", fetchError);
        alert("report ts");
        return;
    }

    if(!('stars' in currentLevel)){
        alert("ts star error im fixing");
        return;
    }
    const eStars = Number(currentLevel.stars) || 0;
    const newStarCount = eStars + 1;

    const { error: updateError } = await supabaseClient
        .from("levels")
        .update({ stars: newStarCount })
        .eq("id", id)
        .select();

    if (updateError) {
        console.error("error", updateError);
        alert("stars error pls fix!!!!");
        return;
    }

    likedLevels.push(id);
    localStorage.setItem("liked_levels", JSON.stringify(likedLevels));

    loadLevels();
}

async function loadLeaderboard() {
    const { data, error } = await supabaseClient
        .from("levels")
        .select("title, stars")
        .order("stars", { ascending: false })
        .limit(30); 

    if (error) {
        console.error("leaderboard error", error);
        return;
    }

    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    if(data.length === 0) {
        list.innerHTML = `<li class="leaderboard-item" style="color:#888;">NaN</li>`;
        return;
    }

    data.forEach((level, index) => {
        const item = document.createElement("li");
        item.className = "leaderboard-item";
        item.innerHTML = `
            <span><strong>#${index + 1}</strong> ${level.title}</span>
            <span>⭐ ${level.stars || 0}</span>
        `;
        list.appendChild(item);
    });
}

async function downloadLevel(id) {
    const { data, error } = await supabaseClient
        .from("levels")
        .select("*")
        .eq("id", id)
        .single();

    if (error || !data) {
        console.error("download error:", error);
        alert("could not download bruh...");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(data.data, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = data.title + ".json";
    document.body.appendChild(a); 
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url); 
}


loadLevels();
</script>

</body>
</html>
