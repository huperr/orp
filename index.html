<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>orporporp</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 800px; 
    margin: 40px auto;
    padding: 0 20px;
    color: #333;
}

h1, h2, h3 {
    font-weight: 600;
    margin-bottom: 20px;
}

h1 { font-size: 24px; }
h2 { font-size: 18px; margin-top: 40px; }

input[type="text"], button {
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    height: 40px;
    padding: 0 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

input[type="file"] {
    font-size: 14px;
    margin-bottom: 10px;
    display: block;
}

button {
    background: #000;
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 500;
}

button:hover {
    background: #222;
}

#fileName {
    font-size: 13px;
    color: #666;
    margin: -5px 0 15px 0;
}

hr {
    border: 0;
    border-top: 1px solid #eee;
    margin: 30px 0;
}

.main-layout {
    display: flex;
    gap: 40px;
}

.feed-column {
    flex: 1;
}

.leaderboard-column {
    width: 250px;
    background: #f9f9f9;
    padding: 20px;
    border-radius: 8px;
    border: 1px solid #eee;
    height: fit-content;
}

.level {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.level h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 400;
}

.action-buttons {
    display: flex;
    gap: 5px;
}

.level button {
    width: auto;
    height: 28px;
    padding: 0 12px;
    font-size: 12px;
    background: #f0f0f0;
    color: #000;
    border: 1px solid #ddd;
    margin: 0;
}

.level button:hover {
    background: #e5e5e5;
}


.star-btn {
    background: #fffbe6 !important;
    border-color: #ffe58f !important;
}
.star-btn:hover {
    background: #fff1b8 !important;
}


.leaderboard-list {
    list-style: none;
    padding: 0;
    margin: 0;
}

.leaderboard-item {
    display: flex;
    justify-content: space-between;
    padding: 8px 0;
    font-size: 14px;
    border-bottom: 1px dashed #ddd;
}
</style>
</head>

<body>

<h1>orporporp</h1>

<input id="title" placeholder="title" type="text">
<input type="file" id="fileInput" accept=".json">
<p id="fileName"></p>

<button onclick="uploadLevel()">upload</button>

<hr>

<div class="main-layout">
    <div class="feed-column">
        <h2>obbies</h2>
        <div id="levels"></div>
    </div>

    <div class="leaderboard-column">
        <h2>leaderboard thingy</h2>
        <ul id="leaderboard" class="leaderboard-list"></ul>
    </div>
</div>

<script>
console.log("running...");

const SUPABASE_URL = "https://nnqjzkwcliapfmagxgfh.supabase.co";
const SUPABASE_KEY = "sb_publishable_7YyiJgIDTOjN8Ne7G6avcQ_aGswLuaD";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.getElementById("fileInput").addEventListener("change", (e) => {
    if (e.target.files.length > 0) {
        document.getElementById("fileName").innerText = e.target.files[0].name;
    } else {
        document.getElementById("fileName").innerText = "";
    }
});

async function uploadLevel() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("choose file bruh");
        return;
    }

    const text = await file.text();
    let jsonData;

    try {
        jsonData = JSON.parse(text);
    } catch (err) {
        alert("invalid...");
        return;
    }

    let title = document.getElementById("title").value.trim();
    if (!title) title = file.name.replace(".json", "");

    const { data, error } = await supabaseClient
        .from("levels")
        .insert({
            title: title,
            data: jsonData,
            stars: 0 
        })
        .select();

    if (error) {
        console.error("error:", error);
        alert("error: " + error.message);
        return;
    }

    alert("uploaded chuds");
    
    document.getElementById("title").value = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("fileName").innerText = "";

    loadLevels();
}

async function loadLevels() {
    
    const { data, error } = await supabaseClient
        .from("levels")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error("error:", error);
        return;
    }

    const div = document.getElementById("levels");
    div.innerHTML = "";

    data.forEach(level => {
        const starsCount = level.stars || 0;
        const item = document.createElement("div");
        item.className = "level";

        
        item.innerHTML = `
            <h3>${level.title}</h3>
            <div class="action-buttons">
                <button class="star-btn" onclick="likeLevel(${level.id})">⭐ ${starsCount}</button>
                <button onclick="downloadLevel(${level.id})">download ts</button>
            </div>
        `;

        div.appendChild(item);
    });

    
    loadLeaderboard();
}

        .select("stars")
        .eq("id", id)
        .single();

    if (fetchError || !currentLevel) {
        console.error("error", fetchError);
        alert("report ts");
        return;
    }

    console.log("ok brochacho", currentLevel);

    if(!('stars' in currentLevel)){
        alert("ts star error im fixing")
        return;
    }
    const eStars = Number(currentLevel.stars) || 0;
    const newStarCount = eStars + 1;
    console.log("updated star count brochacho")
    

    const { error: updateError } = await supabaseClient
        .from("levels")
        .update({ stars: newStarCount })
        .eq("id", id)
        .select();

    if (updateError) {
        console.error("error", updateError);

        console.warn("supa fault bro")

}


async function loadLeaderboard() {
    const { data, error } = await supabaseClient
        .from("levels")
        .select("title, stars")
        .order("stars", { ascending: false })
        .limit(30); 

    if (error) {
        console.error("leaderboard error", error);
        return;
    }

    const list = document.getElementById("leaderboard");
    list.innerHTML = "";

    if(data.length === 0) {
        list.innerHTML = `<li class="leaderboard-item" style="color:#888;">NaN</li>`;
        return;
    }

    data.forEach((level, index) => {
        const item = document.createElement("li");
        item.className = "leaderboard-item";
        item.innerHTML = `
            <span><strong>#${index + 1}</strong> ${level.title}</span>
            <span>⭐ ${level.stars || 0}</span>
        `;
        list.appendChild(item);
    });
}

async function downloadLevel(id) {
    const { data, error } = await supabaseClient
        .from("levels")
        .select("*")
        .eq("id", id)
        .single();

    if (error || !data) {
        console.error("download error:", error);
        alert("could not download bruh!");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(data.data, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = data.title + ".json";
    document.body.appendChild(a); 
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url); 
}

loadLevels();

</script>

</body>
</html>
