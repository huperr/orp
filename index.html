<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Share</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    max-width: 500px;
    margin: 40px auto;
    padding: 0 20px;
    color: #333;
}

h1, h2 {
    font-weight: 600;
    margin-bottom: 20px;
}

h1 { font-size: 24px; }
h2 { font-size: 18px; margin-top: 40px; }

input[type="text"], button {
    font-family: inherit;
    font-size: 14px;
    width: 100%;
    height: 40px;
    padding: 0 10px;
    margin-bottom: 10px;
    border: 1px solid #ccc;
    border-radius: 4px;
    box-sizing: border-box;
}

input[type="file"] {
    font-size: 14px;
    margin-bottom: 10px;
    display: block;
}

button {
    background: #000;
    color: #fff;
    border: none;
    cursor: pointer;
    font-weight: 500;
}

button:hover {
    background: #222;
}

#fileName {
    font-size: 13px;
    color: #666;
    margin: -5px 0 15px 0;
}

hr {
    border: 0;
    border-top: 1px solid #eee;
    margin: 30px 0;
}

.level {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #eee;
}

.level h3 {
    margin: 0;
    font-size: 15px;
    font-weight: 400;
}

.level button {
    width: auto;
    height: 28px;
    padding: 0 12px;
    font-size: 12px;
    background: #f0f0f0;
    color: #000;
    border: 1px solid #ddd;
    margin: 0;
}

.level button:hover {
    background: #e5e5e5;
}
</style>
</head>

<body>

<h1>JSON Share</h1>

<input id="title" placeholder="Level title (optional)" type="text">
<input type="file" id="fileInput" accept=".json">
<p id="fileName"></p>

<button onclick="uploadLevel()">Upload</button>

<hr>

<h2>Levels</h2>
<div id="levels"></div>

<script>
console.log("SCRIPT RUNNING");

// ===================== CONFIG =====================
const SUPABASE_URL = "https://nnqjzkwcliapfmagxgfh.supabase.co";
const SUPABASE_KEY = "sb_publishable_7YyiJgIDTOjN8Ne7G6avcQ_aGswLuaD";

const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===================== FILE NAME =====================
document.getElementById("fileInput").addEventListener("change", (e) => {
    if (e.target.files.length > 0) {
        document.getElementById("fileName").innerText = e.target.files[0].name;
    } else {
        document.getElementById("fileName").innerText = "";
    }
});

// ===================== UPLOAD =====================
async function uploadLevel() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Choose a JSON file");
        return;
    }

    const text = await file.text();
    let jsonData;

    try {
        jsonData = JSON.parse(text);
    } catch (err) {
        alert("Invalid JSON");
        return;
    }

    let title = document.getElementById("title").value.trim();
    if (!title) title = file.name.replace(".json", "");

    const { data, error } = await supabaseClient
        .from("levels")
        .insert({
            title: title,
            data: jsonData
        })
        .select();

    if (error) {
        console.error("UPLOAD ERROR:", error);
        alert("Upload failed: " + error.message);
        return;
    }

    alert("Uploaded successfully!");
    
    document.getElementById("title").value = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("fileName").innerText = "";

    loadLevels();
}

// ===================== LOAD =====================
async function loadLevels() {
    const { data, error } = await supabaseClient
        .from("levels")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error("LOAD ERROR:", error);
        return;
    }

    const div = document.getElementById("levels");
    div.innerHTML = "";

    data.forEach(level => {
        const item = document.createElement("div");
        item.className = "level";

        item.innerHTML = `
            <h3>${level.title}</h3>
            <button onclick="downloadLevel(${level.id})">Download</button>
        `;

        div.appendChild(item);
    });
}

// ===================== DOWNLOAD =====================
async function downloadLevel(id) {
    const { data, error } = await supabaseClient
        .from("levels")
        .select("*")
        .eq("id", id)
        .single();

    if (error || !data) {
        console.error("DOWNLOAD ERROR:", error);
        alert("Could not fetch level data.");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(data.data, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = data.title + ".json";
    document.body.appendChild(a); 
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url); 
}

// ===================== INITIAL LOAD =====================
loadLevels();

</script>

</body>
</html>
