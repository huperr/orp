<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Share</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial;
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

input, button {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
}

.level {
    border: 1px solid #ccc;
    padding: 10px;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>JSON Share</h1>

<input id="title" placeholder="Level title (optional)">

<input type="file" id="fileInput" accept=".json">

<button onclick="uploadLevel()">Upload</button>

<hr>

<h2>Levels</h2>
<div id="levels"></div>

<script>

const SUPABASE_URL = "https://nnqjzkwcliapfmagxgfh.supabase.co";
const SUPABASE_KEY = "sb_publishable_7YyiJgIDTOjN8Ne7G6avcQ_aGswLuaD";

const supabase = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_KEY
);

// UPLOAD
async function uploadLevel() {

    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Choose a JSON file");
        return;
    }

    const text = await file.text();

    let jsonData;

    try {
        jsonData = JSON.parse(text);
    } catch {
        alert("Invalid JSON");
        return;
    }

    let title = document.getElementById("title").value;

    if (!title) {
        title = file.name.replace(".json", "");
    }

    const { error } = await supabase
        .from("levels")
        .insert({
            title: title,
            data: jsonData
        });

    if (error) {
        alert(error.message);
        return;
    }

    alert("Uploaded!");

    loadLevels();
}

// LOAD LEVELS
async function loadLevels() {

    const { data } = await supabase
        .from("levels")
        .select("*")
        .order("created_at", { ascending: false });

    const div = document.getElementById("levels");

    div.innerHTML = "";

    data.forEach(level => {

        const item = document.createElement("div");

        item.className = "level";

        item.innerHTML = `
            <h3>${level.title}</h3>
            <button onclick="downloadLevel(${level.id})">
                Download
            </button>
        `;

        div.appendChild(item);
    });
}

// DOWNLOAD
async function downloadLevel(id) {

    const { data } = await supabase
        .from("levels")
        .select("*")
        .eq("id", id)
        .single();

    const blob = new Blob(
        [JSON.stringify(data.data, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");

    a.href = url;
    a.download = data.title + ".json";
    a.click();
}

loadLevels();

</script>

</body>
</html>
