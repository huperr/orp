<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>JSON Share</title>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 150px;
        }

        input {
            width: 100%;
            margin-bottom: 10px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
        }

        .level {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<h1>JSON Share</h1>

<input
    id="title"
    placeholder="Level title">

<textarea
    id="json"
    placeholder='{"name":"My Level"}'>
</textarea>

<br>

<button onclick="uploadLevel()">
    Upload
</button>

<hr>

<h2>Uploaded Levels</h2>

<div id="levels"></div>

<script>

const SUPABASE_URL =
    "Yhttps://nnqjzkwcliapfmagxgfh.supabase.co";

const SUPABASE_KEY =
    "sb_publishable_7YyiJgIDTOjN8Ne7G6avcQ_aGswLuaD";

const supabase =
    window.supabase.createClient(
        SUPABASE_URL,
        SUPABASE_KEY
    );

async function uploadLevel() {

    try {

        const title =
            document.getElementById("title").value;

        const jsonText =
            document.getElementById("json").value;

        const jsonData =
            JSON.parse(jsonText);

        const { error } =
            await supabase
                .from("levels")
                .insert({
                    title: title,
                    data: jsonData
                });

        if (error) {
            alert(error.message);
            return;
        }

        alert("Uploaded!");

        loadLevels();

    } catch {

        alert("Invalid JSON");

    }
}

async function loadLevels() {

    const levelsDiv =
        document.getElementById("levels");

    levelsDiv.innerHTML = "";

    const { data, error } =
        await supabase
            .from("levels")
            .select("*")
            .order("created_at",
                { ascending: false });

    if (error) {
        console.log(error);
        return;
    }

    data.forEach(level => {

        const div =
            document.createElement("div");

        div.className = "level";

        div.innerHTML = `
            <h3>${level.title}</h3>

            <button onclick="downloadLevel(${level.id})">
                Download
            </button>
        `;

        levelsDiv.appendChild(div);

    });
}

async function downloadLevel(id) {

    const { data } =
        await supabase
            .from("levels")
            .select("*")
            .eq("id", id)
            .single();

    const blob =
        new Blob(
            [JSON.stringify(
                data.data,
                null,
                2
            )],
            {
                type:
                "application/json"
            }
        );

    const url =
        URL.createObjectURL(blob);

    const a =
        document.createElement("a");

    a.href = url;

    a.download =
        data.title + ".json";

    a.click();
}

loadLevels();

</script>

</body>
</html>
