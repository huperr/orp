<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JSON Share</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body {
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: auto;
    padding: 20px;
    background-color: #f9f9f9;
}

input, button {
    width: 100%;
    margin: 5px 0;
    padding: 10px;
    box-sizing: border-box;
}

button {
    cursor: pointer;
    background-color: #007bf5;
    color: white;
    border: none;
    border-radius: 4px;
    font-weight: bold;
}

button:hover {
    background-color: #0056b3;
}

.level {
    border: 1px solid #ccc;
    background: white;
    padding: 15px;
    margin-top: 10px;
    border-radius: 4px;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.level h3 {
    margin: 0;
}

.level button {
    width: auto;
    background-color: #28a745;
}

.level button:hover {
    background-color: #218838;
}
</style>
</head>

<body>

<h1>JSON Share</h1>

<input id="title" placeholder="Level title (optional)">
<input type="file" id="fileInput" accept=".json">

<p id="fileName" style="color: #666; font-style: italic;"></p>

<button onclick="uploadLevel()">Upload</button>

<hr>

<h2>Levels</h2>
<div id="levels"></div>

<script>
console.log("SCRIPT RUNNING");

// ===================== CONFIG =====================
const SUPABASE_URL = "https://nnqjzkwcliapfmagxgfh.supabase.co";
const SUPABASE_KEY = "sb_publishable_7YyiJgIDTOjN8Ne7G6avcQ_aGswLuaD";

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// ===================== FILE NAME =====================
document.getElementById("fileInput").addEventListener("change", (e) => {
    if (e.target.files.length > 0) {
        document.getElementById("fileName").innerText = e.target.files[0].name;
    } else {
        document.getElementById("fileName").innerText = "";
    }
});

// ===================== UPLOAD =====================
async function uploadLevel() {
    const file = document.getElementById("fileInput").files[0];

    if (!file) {
        alert("Choose a JSON file");
        return;
    }

    const text = await file.text();
    let jsonData;

    try {
        jsonData = JSON.parse(text);
    } catch (err) {
        alert("Invalid JSON");
        return;
    }

    let title = document.getElementById("title").value.trim();
    if (!title) title = file.name.replace(".json", "");

    // Note the .select() at the end to correctly format the response object structure in v2
    const { data, error } = await supabase
        .from("levels")
        .insert({
            title: title,
            data: jsonData
        })
        .select();

    if (error) {
        console.error("UPLOAD ERROR:", error);
        alert("Upload failed: " + error.message);
        return;
    }

    alert("Uploaded successfully!");
    
    // Clear inputs
    document.getElementById("title").value = "";
    document.getElementById("fileInput").value = "";
    document.getElementById("fileName").innerText = "";

    loadLevels();
}

// ===================== LOAD =====================
async function loadLevels() {
    const { data, error } = await supabase
        .from("levels")
        .select("*")
        .order("created_at", { ascending: false });

    if (error) {
        console.error("LOAD ERROR:", error);
        return;
    }

    const div = document.getElementById("levels");
    div.innerHTML = "";

    data.forEach(level => {
        const item = document.createElement("div");
        item.className = "level";

        item.innerHTML = `
            <h3>${level.title}</h3>
            <button onclick="downloadLevel(${level.id})">Download</button>
        `;

        div.appendChild(item);
    });
}

// ===================== DOWNLOAD =====================
async function downloadLevel(id) {
    const { data, error } = await supabase
        .from("levels")
        .select("*")
        .eq("id", id)
        .single();

    if (error || !data) {
        console.error("DOWNLOAD ERROR:", error);
        alert("Could not fetch level data.");
        return;
    }

    const blob = new Blob(
        [JSON.stringify(data.data, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = data.title + ".json";
    document.body.appendChild(a); // Appending to body ensures cross-browser compliance
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url); // Clean up memory
}

// ===================== INITIAL LOAD =====================
loadLevels();

</script>

</body>
</html>
