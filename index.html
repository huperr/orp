function serializeInstance(node) {
    const classNameAttr = node.getAttribute('class');
    let objName = "Unknown";
    
    const propsNode = node.querySelector(':scope > Properties');
    if (propsNode) {
        const nameEl = propsNode.querySelector('string[name="Name"]');
        if (nameEl) objName = nameEl.textContent.trim();
    }

    const childNodes = node.querySelectorAll(':scope > Item');
    const isBasePart = ["Part", "WedgePart", "CornerWedgePart", "MeshPart", "SpawnLocation", "TrussPart"].includes(classNameAttr);
    
    if (!isBasePart && childNodes.length === 0) {
        return null;
    }

    let className = classNameAttr;
    if (objName === "SpawnLocation") {
        className = "Spawn";
    } else if (objName === "Truss") {
        className = "Truss";
    }

    const data = {
        "ObbyName": currentFileNameForExport,
        "Name": objName,
        "ClassName": className,
        "Children": []
    };

    if (isBasePart && propsNode) {
        const cframeNode = propsNode.querySelector('CoordinateFrame[name="CFrame"]');
        const sizeNode = propsNode.querySelector('Vector3[name="size"]') || propsNode.querySelector('Vector3[name="Size"]');
        const colorNode = propsNode.querySelector('Color3[name="Color"]') || propsNode.querySelector('Color3uint8[name="Color3uint8"]');
        
        const transform = parseCFrame(cframeNode);

        data.Properties = {
            "Size": parseVector3(sizeNode),
            "Position": transform.position,
            "Rotation": transform.rotation,
            "Color": parseColor3(colorNode)
        };
    }

    childNodes.forEach(child => {
        const serializedChild = serializeInstance(child);
        if (serializedChild) {
            data.Children.push(serializedChild);
        }
    });

    return data;
}

function parseVector3(node) {
    if (!node) return { "X": 1, "Y": 1, "Z": 1 }; 
    
    const xNode = node.querySelector('X') || node.querySelector('x');
    const yNode = node.querySelector('Y') || node.querySelector('y');
    const zNode = node.querySelector('Z') || node.querySelector('z');

    return {
        "X": xNode ? Number(xNode.textContent) : 1,
        "Y": yNode ? Number(yNode.textContent) : 1,
        "Z": zNode ? Number(zNode.textContent) : 1
    };
}

function parseCFrame(node) {
    const defaultTransform = {
        position: { "X": 0, "Y": 0, "Z": 0 },
        rotation: { "X": 0, "Y": 0, "Z": 0 }
    };
    
    if (!node) return defaultTransform;

    const text = node.textContent.trim();
    const values = text.split(/\s+/).map(Number);
    
    if (values.length < 12) return defaultTransform;

    const x = values[0];
    const y = values[1];
    const z = values[2];

    const r00 = values[3],  r01 = values[4],  r02 = values[5];
    const r10 = values[6],  r11 = values[7],  r12 = values[8];
    const r20 = values[9],  r21 = values[10], r22 = values[11];

    let rotX = 0, rotY = 0, rotZ = 0;

    if (r02 < 1) {
        if (r02 > -1) {
            rotX = Math.atan2(-r12, r22);
            rotY = Math.asin(r02);
            rotZ = Math.atan2(-r01, r00);
        } else { 
            rotX = -Math.atan2(r10, r11);
            rotY = -Math.PI / 2;
            rotZ = 0;
        }
    } else { 
        rotX = Math.atan2(r10, r11);
        rotY = Math.PI / 2;
        rotZ = 0;
    }

    const radToDeg = 180 / Math.PI;
    
    return {
        position: { "X": x, "Y": y, "Z": z },
        rotation: {
            "X": Math.round(rotX * radToDeg * 100) / 100,
            "Y": Math.round(rotY * radToDeg * 100) / 100,
            "Z": Math.round(rotZ * radToDeg * 100) / 100
        }
    };
}

function parseColor3(node) {
    if (!node) return { "R": 1, "G": 1, "B": 1 };
    if (node.tagName === "Color3uint8") {
        const val = Number(node.textContent);
        return {
            "R": ((val >> 16) & 255) / 255,
            "G": ((val >> 8) & 255) / 255,
            "B": (val & 255) / 255
        };
    }
    
    const rNode = node.querySelector('R') || node.querySelector('r');
    const gNode = node.querySelector('G') || node.querySelector('g');
    const bNode = node.querySelector('B') || node.querySelector('b');

    return {
        "R": rNode ? Number(rNode.textContent) : 1,
        "G": gNode ? Number(gNode.textContent) : 1,
        "B": bNode ? Number(bNode.textContent) : 1
    };
}

function renderLevelsList() {
    const div = document.getElementById("levels");
    div.innerHTML = "";

    if (filteredLevels.length === 0) {
        div.innerHTML = `<p style="color: #888; font-size: 14px; text-align: center; margin-top: 20px;">no obbies found...</p>`;
        document.getElementById("levelsPageIndicator").innerText = "Page 0 of 0";
        document.getElementById("prevLevelsBtn").disabled = true;
        document.getElementById("nextLevelsBtn").disabled = true;
        return;
    }

    const totalPages = Math.ceil(filteredLevels.length / ITEMS_PER_PAGE);
    if (currentLevelsPage > totalPages) currentLevelsPage = totalPages;
    if (currentLevelsPage < 1) currentLevelsPage = 1;

    const startIdx = (currentLevelsPage - 1) * ITEMS_PER_PAGE;
    const endIdx = startIdx + ITEMS_PER_PAGE;
    const paginatedLevels = filteredLevels.slice(startIdx, endIdx);

    paginatedLevels.forEach(level => {
        const starsCount = level.stars || 0;
        const item = document.createElement("div");
        item.className = "level";
        
        let sizeDisplay = "";
        if (level.file_size) {
            sizeDisplay = level.file_size;
        } else if (level.data) {
            const rawLength = JSON.stringify(level.data).length;
            sizeDisplay = rawLength < 1024 ? rawLength + " B" : (rawLength / 1024).toFixed(1) + " KB";
        }

        item.innerHTML = `
            <h3>${level.title} <span style="font-size: 12px; color: #888; margin-left: 5px;">(${sizeDisplay})</span></h3>
            <div class="action-buttons">
                <button class="star-btn" onclick="likeLevel(${level.id})">⭐ ${starsCount}</button>
                <button onclick="downloadLevel(${level.id})">Download</button>
            </div>
        `;

        div.appendChild(item);
    });

    document.getElementById("levelsPageIndicator").innerText = `Page ${currentLevelsPage} of ${totalPages}`;
    document.getElementById("prevLevelsBtn").disabled = currentLevelsPage === 1;
    document.getElementById("nextLevelsBtn").disabled = currentLevelsPage === totalPages;
}

        return;
    }

    document.getElementById("forumMessage").value = "";
    updateCharCount(); 
    currentForumPage = 1; 
    loadPosts();
}

function escapeHTML(str) {
    return str.replace(/[&<>'"]/g, 
        tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
    );
}

async function niceSite() {
    await loadLevels();
    await loadPosts();
}

niceSite();
</script>
